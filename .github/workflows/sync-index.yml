name: Sync index.html

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch latest index.html
        run: |
          mkdir -p public
          curl -fsSL "https://www.gn-math.dev/" -o public/index.html

      - name: Fetch latest commit hash
        run: |
          HASH=$(curl -s "https://api.github.com/repos/gn-math/html/commits?per_page=1" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['sha'] if d and isinstance(d, list) else 'main')" 2>/dev/null || echo "main")
          echo "$HASH" > public/commits
          echo "Using hash: $HASH"

      - name: Write strip script
        run: |
          cat > strip.py << 'PYEOF'
          import re
          import os

          path = "public/index.html"
          with open(path, "r", encoding="utf-8") as f:
              html = f.read()

          # 1. Strip static ad elements and tracking meta tags
          html = re.sub(r'<div\s+data-ad="[^"]*"[^>]*>.*?</div>', '', html, flags=re.DOTALL)
          html = re.sub(r'<meta\s+name="(google-adsense-account|monetag|ppck-ver|clckd|netpub_[^"]*)"[^>]*>', '', html)

          # 2. Remove the specific rev.iq script and analytics
          html = re.sub(r'<script\s+src="//js\.rev\.iq/[^"]*"></script>', '', html)
          html = re.sub(r'<script[^>]*src="[^"]*googletagmanager[^"]*"[^>]*></script>', '', html)

          # 3. The "Power Stripper" JS Injection
          # This handles: New Tabs, Iframes, and Download Blobs
          strip_js = """
          <script>
          (function() {
              window.cleanHTML = function(h) {
                  if (typeof h !== 'string') return h;
                  // Strip scripts from known ad providers
                  h = h.replace(/<script[^>]*>(googletagmanager|gtag|monetag|invoke|eduplace|rev\.iq)[\\s\\S]*?<\\/script>/gi, '');
                  // Strip ad containers/styles
                  h = h.replace(/<div[^>]*id="sidebarad[^"]*"[^>]*>[\\s\\S]*?<\\/div>/gi, '');
                  h = h.replace(/<style>[^<]*#sidebarad[\\s\\S]*?<\\/style>/gi, '');
                  return h;
              };

              // Proxy the Blob constructor for ad-free downloads
              const OldBlob = window.Blob;
              window.Blob = function(content, options) {
                  if (options && options.type === 'text/html' && Array.isArray(content)) {
                      content = content.map(part => typeof part === 'string' ? window.cleanHTML(part) : part);
                  }
                  return new OldBlob(content, options);
              };

              // Proxy document.write to catch iframes/new tabs
              const oldWrite = document.write;
              document.write = function(h) {
                  oldWrite.apply(this, [window.cleanHTML(h)]);
              };
          })();
          </script>
          """
          # Inject after head
          html = html.replace('<head>', '<head>\n' + strip_js)

          # 4. Flexible JS Patching
          # Wrap .write() calls (e.g. document.write(h) -> document.write(window.cleanHTML(h)))
          html = re.sub(r'(\.document\.write\()([a-zA-Z0-9]+)(\))', r'\1window.cleanHTML(\2)\3', html)

          # Patch the Fetch -> Blob sequence used in downloads
          html = html.replace('new Blob([t]', 'new Blob([window.cleanHTML(t)]')

          with open(path, "w", encoding="utf-8") as f:
              f.write(html)

          print("Ad removal and JS injection complete.")
          PYEOF

      - name: Strip ads
        run: python3 strip.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/index.html public/commits
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "chore: sync index.html and strip ads [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi

          