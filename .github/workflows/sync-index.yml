name: Sync index.html

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch latest index.html
        run: |
          mkdir -p public
          curl -fsSL "https://www.gn-math.dev/" -o public/index.html

      - name: Fetch latest commit hash
        run: |
          HASH=$(curl -s "https://api.github.com/repos/gn-math/html/commits?per_page=1" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['sha'] if d and isinstance(d, list) else 'main')" 2>/dev/null || echo "main")
          echo "$HASH" > public/commits
          echo "Using hash: $HASH"

      - name: Strip ads and Fix JS
        run: |
          python3 - << 'EOF'
          import re

          with open("public/index.html", "r", encoding="utf-8") as f:
              html = f.read()

          # 1. Remove Static Ad Elements
          html = re.sub(r'<div\s+data-ad="[^"]*"[^>]*>.*?</div>', '', html, flags=re.DOTALL)
          html = re.sub(r'<meta\s+name="(google-adsense-account|monetag|ppck-ver|clckd|netpub_[^"]*)"[^>]*>', '', html)
          html = re.sub(r'<script\s+src="[^"]*(googletagmanager|monetag|js\.rev\.iq|invoke\.js|eduplace\.net)[^"]*"[^>]*></script>', '', html)

          # 2. Inject the Global Cleaner (Wrapped in a single line to prevent YAML/Shell breaks)
          # This handles downloads and new tabs safely.
          strip_js = '<script>window.cleanHTML=function(h){if(typeof h!=="string")return h;h=h.replace(/<script[^>]*>(googletagmanager|gtag|monetag|invoke|eduplace|rev\.iq)[\\s\\S]*?<\\/script>/gi,"");h=h.replace(/<div[^>]*id="sidebarad[^"]*"[^>]*>[\\s\\S]*?<\\/div>/gi,"");h=h.replace(/<style>[^<]*#sidebarad[\\s\\S]*?<\\/style>/gi,"");return h;};(function(){const O=window.Blob;window.Blob=function(c,o){if(o&&o.type==="text/html"&&Array.isArray(c)){c=c.map(p=>typeof p==="string"?window.cleanHTML(p):p)}return new O(c,o)};const w=document.write;document.write=function(h){w.apply(this,[window.cleanHTML(h)])}})();</script>'
          
          html = html.replace('<head>', '<head>' + strip_js)

          # 3. Secure Patching (Only replaces exact functional patterns to avoid 404s)
          # Matches .write(h) or .write(hh) safely
          html = re.sub(r'\.write\(([a-zA-Z0-9]+)\)', r'.write(window.cleanHTML(\1))', html)
          
          # Matches the specific Blob download pattern in your file
          html = html.replace('new Blob([t]', 'new Blob([window.cleanHTML(t)]')

          with open("public/index.html", "w", encoding="utf-8") as f:
              f.write(html)
          EOF

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/index.html public/commits
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "chore: sync index.html and strip ads [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi

          