name: Sync index.html

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch latest index.html
        run: |
          mkdir -p public
          curl -fsSL "https://www.gn-math.dev/" -o public/index.html

      - name: Fetch latest commit hash
        run: |
          HASH=$(curl -s "https://api.github.com/repos/gn-math/html/commits?per_page=1" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['sha'] if d and isinstance(d, list) else 'main')" 2>/dev/null || echo "main")
          echo "$HASH" > public/commits
          echo "Using hash: $HASH"

      - name: Write strip script
        run: |
          cat > strip.py << 'PYEOF'
          import re

          with open("public/index.html", "r", encoding="utf-8") as f:
              html = f.read()

          # Remove <div data-ad="..."></div> tags
          html = re.sub(r'<div\s+data-ad="[^"]*"[^>]*>.*?</div>', '', html, flags=re.DOTALL)

          # Remove Google AdSense meta tag
          html = re.sub(r'<meta\s+name="google-adsense-account"[^>]*>', '', html)

          # Remove monetag meta tag
          html = re.sub(r'<meta\s+name="monetag"[^>]*>', '', html)

          # Remove netpub meta tag
          html = re.sub(r'<meta\s+name="netpub_[^"]*"[^>]*>', '', html)

          # Remove ppck-ver and clckd meta tags
          html = re.sub(r'<meta\s+name="(?:ppck-ver|clckd)"[^>]*>', '', html)

          # Remove external ad/tracking scripts (rev.iq, monetag, etc.)
          html = re.sub(r'<script\s+src="//js\.rev\.iq/[^"]*"[^>]*></script>', '', html)
          html = re.sub(r'<script\s+src="[^"]*monetag[^"]*"[^>]*>.*?</script>', '', html, flags=re.DOTALL)

          # Remove Google Analytics gtag script tags and inline gtag calls
          html = re.sub(r'<script[^>]*src="[^"]*googletagmanager[^"]*"[^>]*></script>', '', html)
          html = re.sub(r'<script>\s*window\.dataLayer.*?gtag\(\'config\'[^)]*\);\s*</script>', '', html, flags=re.DOTALL)

          # Inject ad blocker + sidebar remover + permission blocker before </body>
          blocker = """<script>
          (function() {
              var blocked = ["eduplace.net", "motorsnag", "invoke.js", "adinplay.com"];

              // Block window.open for ad domains
              var _open = window.open;
              window.open = function(url) {
                  if (url && blocked.some(function(d) { return url.indexOf(d) !== -1; })) return null;
                  return _open.apply(this, arguments);
              };

              // Block fetch for ad domains
              var _fetch = window.fetch;
              window.fetch = function(url) {
                  if (url && blocked.some(function(d) { return String(url).indexOf(d) !== -1; })) return Promise.reject(new Error("Blocked"));
                  return _fetch.apply(this, arguments);
              };

              // Block motion sensor permission requests
              if (window.DeviceMotionEvent && window.DeviceMotionEvent.requestPermission) {
                  window.DeviceMotionEvent.requestPermission = function() { return Promise.resolve("denied"); };
              }
              if (window.DeviceOrientationEvent && window.DeviceOrientationEvent.requestPermission) {
                  window.DeviceOrientationEvent.requestPermission = function() { return Promise.resolve("denied"); };
              }

              // Watch the iframe for sidebar ads and remove them as they appear
              var frame = document.getElementById("zoneFrame");
              if (frame) {
                  frame.addEventListener("load", function() {
                      try {
                          var doc = frame.contentDocument || frame.contentWindow.document;
                          ["sidebarad1", "sidebarad2"].forEach(function(id) {
                              var el = doc.getElementById(id);
                              if (el) el.remove();
                          });
                          var obs = new MutationObserver(function() {
                              ["sidebarad1", "sidebarad2"].forEach(function(id) {
                                  var el = doc.getElementById(id);
                                  if (el) el.remove();
                              });
                          });
                          obs.observe(doc.body, { childList: true, subtree: true });
                      } catch(e) {}
                  });
              }
          })();
          </script>"""

          html = html.replace("</body>", blocker + "\n</body>")

          with open("public/index.html", "w", encoding="utf-8") as f:
              f.write(html)

          print("Ad removal complete.")
          PYEOF

      - name: Strip ads
        run: python3 strip.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/index.html public/commits
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "chore: sync index.html and strip ads [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi