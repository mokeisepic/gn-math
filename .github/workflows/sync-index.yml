name: Sync index.html

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch latest index.html
        run: |
          mkdir -p public
          curl -fsSL "https://www.gn-math.dev/" -o public/index.html

      - name: Fetch latest commit hash
        run: |
          HASH=$(curl -s "https://api.github.com/repos/gn-math/html/commits?per_page=1" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['sha'] if d and isinstance(d, list) else 'main')" 2>/dev/null || echo "main")
          echo "$HASH" > public/commits
          echo "Using hash: $HASH"

      - name: Write strip script
        run: |
          cat > strip.py << 'PYEOF'
          import re

          with open("public/index.html", "r", encoding="utf-8") as f:
              html = f.read()

          # Remove <div data-ad="..."></div> tags
          html = re.sub(r'<div\s+data-ad="[^"]*"[^>]*>.*?</div>', '', html, flags=re.DOTALL)

          # Remove Google AdSense meta tag
          html = re.sub(r'<meta\s+name="google-adsense-account"[^>]*>', '', html)

          # Remove monetag meta tag
          html = re.sub(r'<meta\s+name="monetag"[^>]*>', '', html)

          # Remove netpub meta tag
          html = re.sub(r'<meta\s+name="netpub_[^"]*"[^>]*>', '', html)

          # Remove ppck-ver and clckd meta tags
          html = re.sub(r'<meta\s+name="(?:ppck-ver|clckd)"[^>]*>', '', html)

          # Remove external ad/tracking scripts (rev.iq, monetag, etc.)
          html = re.sub(r'<script\s+src="//js\.rev\.iq/[^"]*"[^>]*></script>', '', html)
          html = re.sub(r'<script\s+src="[^"]*monetag[^"]*"[^>]*>.*?</script>', '', html, flags=re.DOTALL)

          # Remove Google Analytics gtag script tags and inline gtag calls
          html = re.sub(r'<script[^>]*src="[^"]*googletagmanager[^"]*"[^>]*></script>', '', html)
          html = re.sub(r'<script>\s*window\.dataLayer.*?gtag\(\'config\'[^)]*\);\s*</script>', '', html, flags=re.DOTALL)

          # Shared ad stripping function to inject into the page
          strip_fn = """
          function stripGameAds(h) {
              h = h.replace(/<div[^>]*id="sidebarad[^"]*"[^>]*>[\\s\\S]*?<\\/div>\\s*<\\/div>/gi, '');
              h = h.replace(/<style>[^<]*#sidebarad[\\s\\S]*?<\\/style>/gi, '');
              h = h.replace(/<script[^>]*googletagmanager[^>]*>[\\s\\S]*?<\\/script>/gi, '');
              h = h.replace(/<script>[\\s\\S]*?gtag\\([\\s\\S]*?<\\/script>/gi, '');
              h = h.replace(/<script[^>]*eduplace\\.net[^>]*>[\\s\\S]*?<\\/script>/gi, '');
              h = h.replace(/<script[^>]*invoke\\.js[^>]*>[\\s\\S]*?<\\/script>/gi, '');
              return h;
          }"""

          # Inject stripGameAds function before the first function definition
          html = html.replace(
              "function isBlockedDomain(url) {",
              strip_fn + "\n          function isBlockedDomain(url) {"
          )

          # Patch openGame iframe write
          html = html.replace(
              "f.contentDocument.open();\n        f.contentDocument.write(h);\n        f.contentDocument.close();",
              "h = stripGameAds(h);\n        f.contentDocument.open();\n        f.contentDocument.write(h);\n        f.contentDocument.close();"
          )

          # Patch aboutBlank
          html = html.replace(
              "w.document.open();\n                w.document.write(hh);\n                w.document.close();",
              "hh = stripGameAds(hh);\n                w.document.open();\n                w.document.write(hh);\n                w.document.close();"
          )
          html = html.replace(
              "w.document.open();\n            w.document.write(h);\n            w.document.close();",
              "h = stripGameAds(h);\n            w.document.open();\n            w.document.write(h);\n            w.document.close();"
          )

          # Patch downloadZone
          html = html.replace(
              "fetch(u).then(r=>r.text()).then(t => {\n        const b = new Blob([t]",
              "fetch(u).then(r=>r.text()).then(t => {\n        t = stripGameAds(t);\n        const b = new Blob([t]"
          )

          with open("public/index.html", "w", encoding="utf-8") as f:
              f.write(html)

          print("Ad removal complete.")
          PYEOF

      - name: Strip ads
        run: python3 strip.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/index.html public/commits
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "chore: sync index.html and strip ads [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi